<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>{{ title if title else settings.creator_name }}</title>

    <link
        rel="stylesheet"
        href="/static/style.css">

</head>

<body>

<!-- Mobile Header -->

<header class="mobile-header">

    <button
        id="mobile-sidebar-toggle"
        class="mobile-sidebar-toggle">

        ☰

    </button>

    <div class="mobile-brand">

        <h2>{{ settings.queue_name}}</h2>

    </div>

</header>

<div class="app-layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <button
                id="sidebar-toggle"
                class="sidebar-toggle"
                aria-label="Toggle Sidebar">

                ☰

            </button>

            <div class="sidebar-brand">

                <h2>{{ settings.queue_name }}</h2>

                <span class="sidebar-subtitle">

                    Queue Management

                </span>

            </div>

        </div>

        <nav class="sidebar-nav">

            <a
                href="/"
                class="{% if request.url.path == '/' %}active{% endif %}">

                <span class="nav-icon">🏠</span>

                <span class="nav-text">

                    Dashboard

                </span>

            </a>

            <a
                href="/queue"
                class="{% if request.url.path == '/queue' %}active{% endif %}">

                <span class="nav-icon">📋</span>

                <span class="nav-text">

                    Queue

                </span>

            </a>

            <a
                href="/history"
                class="{% if request.url.path == '/history' %}active{% endif %}">

                <span class="nav-icon">📜</span>

                <span class="nav-text">

                    History

                </span>

            </a>

            <a
                href="/statistics"
                class="{% if request.url.path == '/statistics' %}active{% endif %}">

                <span class="nav-icon">📊</span>

                <span class="nav-text">

                    Statistics

                </span>

            </a>

            <a
                href="/moderators"
                class="{% if request.url.path == '/moderators' %}active{% endif %}">

                <span class="nav-icon">👥</span>

                <span class="nav-text">

                    Moderators

                </span>

            </a>

        </nav>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav sidebar-secondary">

            <a
                href="/settings"
                class="{% if request.url.path == '/settings' %}active{% endif %}">

                <span class="nav-icon">⚙️</span>

                <span class="nav-text">

                    Settings

                </span>

            </a>

        </nav>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-user">

            <div class="sidebar-user-card">

                <div class="sidebar-avatar">

                    👤

                </div>

                <div class="sidebar-user-details">

                    <span class="user-name">

                        Queue Administrator

                    </span>

                    <span class="user-role">

                        Administrator

                    </span>

                </div>

            </div>

            <a
                href="/logout"
                class="sidebar-logout">

                <span class="nav-icon">

                    🚪

                </span>

                <span class="nav-text">

                    Logout

                </span>

            </a>

        </div>

    </aside>

    <div
        id="sidebar-overlay"
        class="sidebar-overlay">

    </div>

    <!-- Main Content -->

    <main class="main-content">

        {% block content %}
        {% endblock %}

    </main>

</div>

<script>

const sidebar = document.querySelector(".sidebar");
const desktopToggle = document.getElementById("sidebar-toggle");
const mobileToggle = document.getElementById("mobile-sidebar-toggle");
const overlay = document.getElementById("sidebar-overlay");

function isMobile() {

    return window.innerWidth <= 900;

}

function restoreSidebarState() {

    if (isMobile()) {

        sidebar.classList.remove("collapsed");
        return;

    }

    const savedState = localStorage.getItem("sidebar");

    if (savedState === "collapsed") {

        sidebar.classList.add("collapsed");

    } else {

        sidebar.classList.remove("collapsed");

    }

}

function toggleDesktopSidebar() {

    if (isMobile()) return;

    sidebar.classList.toggle("collapsed");

    localStorage.setItem(
        "sidebar",
        sidebar.classList.contains("collapsed")
            ? "collapsed"
            : "expanded"
    );

}

function openMobileSidebar() {

    sidebar.classList.add("mobile-open");
    overlay.classList.add("show");

}

function closeMobileSidebar() {

    sidebar.classList.remove("mobile-open");
    overlay.classList.remove("show");

}

function toggleMobileSidebar() {

    if (sidebar.classList.contains("mobile-open")) {

        closeMobileSidebar();

    } else {

        openMobileSidebar();

    }

}

desktopToggle.addEventListener(
    "click",
    toggleDesktopSidebar
);

mobileToggle.addEventListener(
    "click",
    toggleMobileSidebar
);

overlay.addEventListener(
    "click",
    closeMobileSidebar
);

window.addEventListener(
    "resize",
    () => {

        if (!isMobile()) {

            closeMobileSidebar();

        }

        restoreSidebarState();

    }
);

document.addEventListener(
    "keydown",
    event => {

        if (
            event.key === "Escape" &&
            sidebar.classList.contains("mobile-open")
        ) {

            closeMobileSidebar();

        }

    }
);

restoreSidebarState();

</script>

</body>

</html>
