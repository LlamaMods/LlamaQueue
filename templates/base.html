<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>{{ title if title else "CreatorQueue" }}</title>

    <link
        rel="stylesheet"
        href="/static/style.css">

</head>

<body>

<div class="app-layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <button
                id="sidebar-toggle"
                class="sidebar-toggle">

                ☰

            </button>

            <h2>🎮 {{ settings.creator_name }}</h2>

        </div>

        <nav class="sidebar-nav">

            <a
                href="/"
                class="{% if request.url.path == '/' %}active{% endif %}">

                <span class="nav-icon">🏠</span>
                <span class="nav-text">Dashboard</span>

            </a>

            <a
                href="/queue"
                class="{% if request.url.path == '/queue' %}active{% endif %}">

                <span class="nav-icon">👥</span>
                <span class="nav-text">Queue</span>

            </a>

            <a
                href="/activity"
                class="{% if request.url.path == '/activity' %}active{% endif %}">

                <span class="nav-icon">📜</span>
                <span class="nav-text">Activity</span>

            </a>

            <a
                href="/settings"
                class="{% if request.url.path == '/settings' %}active{% endif %}">

                <span class="nav-icon">⚙</span>
                <span class="nav-text">Settings</span>

            </a>

            <a
                href="/branding"
                class="{% if request.url.path == '/branding' %}active{% endif %}">

                <span class="nav-icon">🎨</span>
                <span class="nav-text">Branding</span>

            </a>

            <a
                href="/moderators"
                class="{% if request.url.path == '/moderators' %}active{% endif %}">

                <span class="nav-icon">👮</span>
                <span class="nav-text">Moderators</span>

            </a>

            <a
                href="/stats"
                class="{% if request.url.path == '/stats' %}active{% endif %}">

                <span class="nav-icon">📊</span>
                <span class="nav-text">Statistics</span>

            </a>

            <a
                href="/about"
                class="{% if request.url.path == '/about' %}active{% endif %}">

                <span class="nav-icon">❓</span>
                <span class="nav-text">About</span>

            </a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        {% block content %}
        {% endblock %}

    </main>

</div>

<script>

const sidebar =
    document.querySelector(".sidebar");

const toggle =
    document.getElementById("sidebar-toggle");

// Restore previous state

if (localStorage.getItem("sidebar") === "collapsed") {

    sidebar.classList.add("collapsed");

}

// Toggle sidebar

toggle.addEventListener("click", () => {

    sidebar.classList.toggle("collapsed");

    localStorage.setItem(
        "sidebar",
        sidebar.classList.contains("collapsed")
            ? "collapsed"
            : "expanded"
    );

});

</script>

</body>

</html>
